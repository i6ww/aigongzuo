<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 画图工作台</title>
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
    <div class="app-container">
        <!-- 左侧边栏 -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h1>🎨 AI 画图</h1>
            </div>
            
            <div class="sidebar-section">
                <h3>分辨率</h3>
                <div class="resolution-buttons">
                    <button class="resolution-btn" data-res="1K">1K</button>
                    <button class="resolution-btn active" data-res="2K">2K</button>
                    <button class="resolution-btn" data-res="4K">4K</button>
                </div>
            </div>
            
            <div class="sidebar-section">
                <h3>最近提示词</h3>
                <div id="historyList" class="history-list"></div>
            </div>
        </aside>

        <!-- 主内容区 -->
        <main class="main-content">
            <div class="header">
                <div class="header-actions">
                    <button class="btn-icon" id="themeToggle" onclick="toggleTheme()" title="切换主题">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" id="themeIcon">
                            <circle cx="12" cy="12" r="5"></circle>
                            <line x1="12" y1="1" x2="12" y2="3"></line>
                            <line x1="12" y1="21" x2="12" y2="23"></line>
                            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                            <line x1="1" y1="12" x2="3" y2="12"></line>
                            <line x1="21" y1="12" x2="23" y2="12"></line>
                            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                        </svg>
                    </button>
                </div>
            </div>

            <div class="chat-container">
                <!-- 功能切换 -->
                <div class="mode-tabs">
                    <button class="mode-tab active" data-mode="text2image">文生图</button>
                    <button class="mode-tab" data-mode="image2image">图生图</button>
                </div>

                <!-- 上传区域（图生图用） -->
                <div id="uploadArea" class="upload-area" style="display: none;">
                    <div class="upload-grid">
                        <div class="upload-item" data-index="0" onclick="triggerUpload(0)">
                            <div class="upload-placeholder"><span>参考图1</span></div>
                            <img class="preview-img" style="display: none;">
                            <button class="btn-remove" style="display: none;" onclick="event.stopPropagation(); removeUploadedImage(0)">✕</button>
                        </div>
                        <div class="upload-item" data-index="1" onclick="triggerUpload(1)">
                            <div class="upload-placeholder"><span>参考图2</span></div>
                            <img class="preview-img" style="display: none;">
                            <button class="btn-remove" style="display: none;" onclick="event.stopPropagation(); removeUploadedImage(1)">✕</button>
                        </div>
                        <div class="upload-item" data-index="2" onclick="triggerUpload(2)">
                            <div class="upload-placeholder"><span>参考图3</span></div>
                            <img class="preview-img" style="display: none;">
                            <button class="btn-remove" style="display: none;" onclick="event.stopPropagation(); removeUploadedImage(2)">✕</button>
                        </div>
                        <div class="upload-item" data-index="3" onclick="triggerUpload(3)">
                            <div class="upload-placeholder"><span>参考图4</span></div>
                            <img class="preview-img" style="display: none;">
                            <button class="btn-remove" style="display: none;" onclick="event.stopPropagation(); removeUploadedImage(3)">✕</button>
                        </div>
                        <div class="upload-item" data-index="4" onclick="triggerUpload(4)">
                            <div class="upload-placeholder"><span>参考图5</span></div>
                            <img class="preview-img" style="display: none;">
                            <button class="btn-remove" style="display: none;" onclick="event.stopPropagation(); removeUploadedImage(4)">✕</button>
                        </div>
                        <div class="upload-item" data-index="5" onclick="triggerUpload(5)">
                            <div class="upload-placeholder"><span>参考图6</span></div>
                            <img class="preview-img" style="display: none;">
                            <button class="btn-remove" style="display: none;" onclick="event.stopPropagation(); removeUploadedImage(5)">✕</button>
                        </div>
                        <div class="upload-footer">
                            <span>📎 参考图最大支持 10MB</span>
                        </div>
                    </div>
                    <input type="file" id="imageInput" accept="image/*" style="display: none;" onchange="handleImageUpload(event)">
                </div>

                <!-- 欢迎信息 -->
                <div class="welcome-message" id="welcomeMessage">
                    <h2>欢迎使用 AI 画图工作台</h2>
                    <p>输入描述词，开始创作你的图片</p>
                </div>

                <!-- 结果区域 -->
                <div id="resultArea" class="result-area" style="display: none;">
                    <div id="resultLoading" class="loading" style="display: none;">
                        <div class="spinner"></div>
                        <span>正在生成图片...</span>
                    </div>
                    <div id="resultContent" class="result-content"></div>
                </div>
            </div>

            <!-- 底部输入区 -->
            <div class="input-area">
                <div class="input-wrapper">
                    <textarea id="messageInput" placeholder="描述你想要生成的图片..." rows="3"></textarea>
                    <button id="generateBtn" class="btn-primary">开始生成</button>
                </div>
            </div>
        </main>

        <!-- 右侧设置栏 -->
        <aside class="settings-sidebar">
            <div class="settings-section">
                <h3>API 设置</h3>
                <div class="form-group">
                    <label>API Key</label>
                    <input type="password" id="apiKey" placeholder="输入你的 API Key">
                </div>
            </div>
            
            <div class="settings-section">
                <h3>模型选择</h3>
                <select id="modelSelect" class="model-select">
                    <!-- 动态生成 -->
                </select>
            </div>
            
            <div class="settings-section">
                <h3>🌐 主站点</h3>
                <div class="site-link">
                    <a href="https://www.371181668.xyz" target="_blank" rel="noopener">https://www.371181668.xyz</a>
                </div>
            </div>
            
            <div class="settings-section">
                <h3>📋 更新日志</h3>
                <div class="changelog">
                    <ul class="changelog-list">
                        <li><span class="date">04.13</span> 新增主站点入口</li>
                        <li><span class="date">04.10</span> 支持6张参考图</li>
                        <li><span class="date">04.05</span> 新增4K分辨率</li>
                        <li><span class="date">03.28</span> 深浅主题切换</li>
                        <li><span class="date">03.20</span> 初始版本发布</li>
                    </ul>
                </div>
            </div>
        </aside>
    </div>

    <script src="/script.js"></script>
</body>
</html>
